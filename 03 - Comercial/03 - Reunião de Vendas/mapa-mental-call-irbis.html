<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mapa da Call — IRBIS</title>
<style>
  :root{
    --bg:#0e0e11; --panel:rgba(14,14,17,.92); --node:#1b1c22; --node-bd:#2a2b33;
    --text:#ececf1; --muted:#8a8b94; --red:#e11d2e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;}
  body{padding-bottom:60px;}

  /* ---------- header ---------- */
  #hd{position:sticky;top:0;z-index:50;background:var(--panel);backdrop-filter:blur(12px);
    border-bottom:1px solid #222;padding:max(10px,env(safe-area-inset-top)) 14px 10px;}
  #hd .row{display:flex;align-items:center;gap:10px;}
  #hd .brand{font-weight:900;font-size:13px;letter-spacing:.1em;}
  #hd .brand em{color:var(--red);font-style:normal;}
  #seg{margin-left:auto;display:flex;background:#17181d;border:1px solid #2c2d36;border-radius:999px;padding:3px;}
  #seg button{border:0;background:transparent;color:#9a9ba4;font-size:12px;font-weight:700;
    padding:6px 14px;border-radius:999px;cursor:pointer;}
  #seg button.on{background:var(--red);color:#fff;}

  /* ---------- breadcrumbs ---------- */
  #crumbs{display:flex;gap:6px;overflow-x:auto;padding:10px 2px 2px;scrollbar-width:none;}
  #crumbs::-webkit-scrollbar{display:none;}
  .crumb{flex:0 0 auto;font-size:11.5px;font-weight:700;color:#cfd0d8;background:#17181d;
    border:1px solid #2c2d36;border-radius:999px;padding:5px 11px;cursor:pointer;white-space:nowrap;}
  .crumb.here{border-color:var(--cc,#555);color:var(--cc,#fff);}
  .crumb .x{opacity:.55;margin-right:4px;}

  /* ---------- map (drill) ---------- */
  #map{max-width:680px;margin:0 auto;padding:14px 14px 30px;}
  #wrap{position:relative;}
  #lines{position:absolute;inset:0;pointer-events:none;z-index:0;}

  #focus{position:relative;z-index:1;display:inline-block;max-width:100%;
    background:#000;border:2px solid var(--cc,var(--red));border-radius:16px;
    padding:14px 18px;margin:6px 0 18px;box-shadow:0 0 0 6px color-mix(in srgb,var(--cc,var(--red)) 12%,transparent),0 8px 30px rgba(0,0,0,.5);}
  #focus small{display:block;font-size:9.5px;letter-spacing:.28em;color:var(--cc,var(--red));font-weight:800;margin-bottom:5px;}
  #focus .t{font-size:18px;font-weight:900;letter-spacing:.04em;line-height:1.3;}
  #focus.fala .t{font-weight:600;font-size:16px;letter-spacing:0;}

  .card{position:relative;z-index:1;margin:0 0 12px 34px;border-radius:14px;cursor:pointer;
    animation:in .35s cubic-bezier(.2,.8,.3,1) both;}
  @keyframes in{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:none;}}
  .card .inner{display:flex;align-items:center;gap:10px;}
  .card.f .inner{background:var(--node);border:1px solid var(--node-bd);border-left:4px solid var(--cc);
    border-radius:14px;padding:13px 14px;box-shadow:0 2px 12px rgba(0,0,0,.35);}
  .card.f .txt{font-size:15.5px;line-height:1.5;}
  .card.f .txt::before{content:"\201C";color:var(--cc);font-weight:900;}
  .card.f .txt::after{content:"\201D";color:var(--cc);font-weight:900;}
  .card.l .inner{background:color-mix(in srgb,var(--cc) 10%,#141519);border:1px solid color-mix(in srgb,var(--cc) 35%,#222);
    border-radius:14px;padding:14px;}
  .card.l .txt{font-size:15px;font-weight:800;color:var(--cc);letter-spacing:.02em;line-height:1.35;}
  .card.n .inner{border:1.5px dashed #3a3b45;border-radius:12px;padding:10px 13px;}
  .card.n .txt{font-size:12px;font-weight:700;font-style:italic;color:var(--muted);letter-spacing:.05em;line-height:1.45;}
  .card .meta{margin-left:auto;flex:0 0 auto;display:flex;align-items:center;gap:7px;}
  .badge{min-width:24px;height:24px;border-radius:999px;border:2px solid var(--cc);color:var(--cc);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;padding:0 5px;}
  .chev{color:var(--cc);font-size:18px;font-weight:900;}
  .card.done{opacity:.38;}
  .sub{font-size:10px;color:#6f7078;letter-spacing:.18em;font-weight:800;margin:2px 0 10px 34px;}

  /* ---------- cola (linear) ---------- */
  #cola{max-width:680px;margin:0 auto;padding:6px 14px 40px;display:none;}
  .sec{position:sticky;top:56px;z-index:5;margin:22px 0 10px;display:flex;align-items:center;gap:10px;
    background:var(--bg);padding:8px 0;}
  .sec .dot{width:12px;height:12px;border-radius:50%;background:var(--cc);box-shadow:0 0 14px var(--cc);}
  .sec .t{font-size:15px;font-weight:900;letter-spacing:.08em;color:var(--cc);}
  .sec .line{flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--cc),transparent);}
  .gl{font-size:12.5px;font-weight:800;color:var(--cc);opacity:.9;letter-spacing:.04em;margin:14px 0 8px;}
  .gl.g2{margin-left:14px;opacity:.75;}
  .gl.g3{margin-left:28px;opacity:.6;}
  #cola .card{margin-left:0;animation:none;}
  #cola .ind2{margin-left:14px;}
  #cola .ind3{margin-left:28px;}

  #hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:40;
    background:var(--panel);border:1px solid #26272e;color:var(--muted);font-size:11px;
    padding:6px 14px;border-radius:999px;backdrop-filter:blur(8px);white-space:nowrap;}
</style>
</head>
<body>

<div id="hd">
  <div class="row">
    <div class="brand">IRBIS<em>.</em>&nbsp; CALL · 45 MIN</div>
    <div id="seg">
      <button id="mMap" class="on">Mapa</button>
      <button id="mCola">Cola</button>
    </div>
  </div>
  <div id="crumbs"></div>
</div>

<div id="map"><div id="wrap"><svg id="lines"></svg><div id="content"></div></div></div>
<div id="cola"></div>
<div id="hint">toque num ramo para entrar · toque numa fala para marcar como dita</div>

<script>

   ]),
   F("A pergunta não é quanto custa o site. É quanto custa continuar sem ele. Você me disse que perde [implicação]. Esse é o preço de não decidir.")

   L("Número",[

   ]),
   L("Objeção = diagnóstico da call",[
     N("“PRECISO PENSAR” → IMPLICAÇÃO FRACA NO SPIN — A DOR NÃO DOEU"),
     N("“TÁ CARO” → ANCORAGEM FRACA — NÚMERO CHEGOU ANTES DO VALOR"),
     N("“SÓCIO” → DECISOR NÃO MAPEADO NO AGENDAMENTO"),
     N("“SERÁ QUE FUNCIONA?” → AUTORIDADE E CASES MAL USADOS NO PITCH"),
     N("OBJEÇÃO RECORRENTE = ETAPA PRA TREINAR")
   ]),
   L("Nunca na call",[
     N("ENTUSIASMO DE PALCO (“MELHOR DIA DA MINHA VIDA”)"),
     N("“ESTOU À DISPOSIÇÃO” · “PARCERIA” · “SOLUÇÕES PERSONALIZADAS” · “METODOLOGIA ÁGIL”"),
     N("PEDIR DESCULPA POR PREÇO, FOLLOW-UP OU SILÊNCIO"),
     N("JUSTIFICAR O PREÇO MAIS DE UMA VEZ"),
     N("PROMETER FORA DO ESCOPO — A IRBIS FAZ SÓ SITES")
   ]),
   L("Mindset do closer",[
     N("ESPERE OBJEÇÕES — SURPRESA É FALTA DE PREPARO"),
     N("NÃO REAJA EMOCIONALMENTE"),
     N("TOM CALMO E FIRME — A IRBIS NÃO CONVENCE NO GRITO, CONDUZ NO CRITÉRIO"),
     N("DESAPEGO SELETIVO — “NÃO” HONESTO VALE MAIS QUE “SIM” ARRANCADO")
   ]),
   N("OBJEÇÃO NÃO SE COMBATE, SE CONDUZ. QUEM ARGUMENTA PERDE. QUEM CONDUZ, FECHA.")
 ]}
]};

/* ---------- index ---------- */
const ALL=[];
(function walk(n,depth,color,parent){
  n.id=ALL.length;n.depth=depth;n.parent=parent;
  n.color=n.color||color||"#e11d2e";
  ALL.push(n);(n.c||[]).forEach(ch=>walk(ch,depth+1,n.color,n));
})(DATA,0,null,null);
const byId=id=>ALL[id];
const countDesc=n=>{let c=0;(n.c||[]).forEach(k=>{c+=1+countDesc(k);});return c;};
const said=new Set();

/* ---------- els ---------- */
const crumbsEl=document.getElementById("crumbs");
const contentEl=document.getElementById("content");
const lines=document.getElementById("lines");
const wrap=document.getElementById("wrap");
const mapEl=document.getElementById("map");
const colaEl=document.getElementById("cola");
let focusId=0;

/* ---------- mapa (drill) ---------- */
function shortT(n){return n.k==="root"?"CALL":n.t.replace(/[“”]/g,"").split("—")[0].trim();}

function renderCrumbs(){
  crumbsEl.innerHTML="";
  const chain=[];let n=byId(focusId);
  while(n){chain.unshift(n);n=n.parent;}
  chain.forEach((c,i)=>{
    const b=document.createElement("div");
    b.className="crumb"+(i===chain.length-1?" here":"");
    b.style.setProperty("--cc",c.color);
    b.innerHTML=(i>0?'<span class="x">›</span>':"")+shortT(c);
    b.onclick=()=>{if(c.id!==focusId)go(c.id);};
    crumbsEl.appendChild(b);
  });
  crumbsEl.scrollLeft=crumbsEl.scrollWidth;
}

function cardFor(n,i,inMap){
  const d=document.createElement("div");
  d.className="card "+(n.k==="b"?"l":n.k)+(said.has(n.id)?" done":"");
  d.style.setProperty("--cc",n.color);
  if(inMap)d.style.animationDelay=(Math.min(i,12)*45)+"ms";
  const kids=n.c&&n.c.length;
  d.innerHTML=`<div class="inner"><div class="txt"></div>
    <div class="meta">${kids?`<div class="badge">${countDesc(n)}</div><div class="chev">›</div>`:""}</div></div>`;
  d.querySelector(".txt").textContent=(n.k==="b"&&n.time)?(n.t+" · "+n.time):n.t;
  d.onclick=()=>{
    if(kids)go(n.id);
    else{said.has(n.id)?said.delete(n.id):said.add(n.id);d.classList.toggle("done");}
  };
  return d;
}

function renderMap(){
  renderCrumbs();
  const f=byId(focusId);
  contentEl.innerHTML="";

  const fo=document.createElement("div");
  fo.id="focus";fo.style.setProperty("--cc",f.color);
  if(f.k==="f")fo.classList.add("fala");
  fo.innerHTML=`<small></small><div class="t"></div>`;
  fo.querySelector("small").textContent=f.k==="root"?"IRBIS · ESTÚDIO DIGITAL":(f.parent&&f.parent.k!=="root"?shortT(f.parent):"ETAPA");
  fo.querySelector(".t").textContent=f.t+(f.time?" · "+f.time:"");
  contentEl.appendChild(fo);

  const lbl=document.createElement("div");lbl.className="sub";
  lbl.textContent=f.k==="root"?((f.c||[]).length+" RAMOS — TOQUE PRA ENTRAR"):"RAMOS";
  contentEl.appendChild(lbl);

  (f.c||[]).forEach((k,i)=>contentEl.appendChild(cardFor(k,i,true)));
  requestAnimationFrame(draw);
}

function draw(){
  const fo=document.getElementById("focus");
  if(!fo)return;
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  lines.setAttribute("width",W);lines.setAttribute("height",H);
  lines.style.width=W+"px";lines.style.height=H+"px";
  while(lines.firstChild)lines.removeChild(lines.firstChild);
  const bx=fo.offsetLeft+26, by=fo.offsetTop+fo.offsetHeight;
  document.querySelectorAll("#content .card").forEach(c=>{
    const cy=c.offsetTop+Math.min(c.offsetHeight/2,30), cx=c.offsetLeft;
    const col=getComputedStyle(c).getPropertyValue("--cc").trim()||"#888";
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M ${bx} ${by} C ${bx} ${by+(cy-by)*.55}, ${bx} ${cy}, ${cx} ${cy}`);
    p.setAttribute("fill","none");p.setAttribute("stroke",col);
    p.setAttribute("stroke-width",3.5);p.setAttribute("stroke-linecap","round");
    p.setAttribute("stroke-opacity",.85);
    lines.appendChild(p);
  });
}

function go(id){
  focusId=id;renderMap();
  scrollTo({top:0,behavior:"smooth"});
}

/* ---------- cola (linear) ---------- */
function renderCola(){
  colaEl.innerHTML="";
  DATA.c.forEach(b=>{
    const s=document.createElement("div");s.className="sec";s.style.setProperty("--cc",b.color);
    s.innerHTML=`<div class="dot"></div><div class="t"></div><div class="line"></div>`;
    s.querySelector(".t").textContent=b.t+" · "+b.time;
    colaEl.appendChild(s);
    (function emit(n,lvl){
      (n.c||[]).forEach(k=>{
        if(k.k==="l"){
          const g=document.createElement("div");
          g.className="gl"+(lvl>=2?" g3":lvl===1?" g2":"");
          g.style.setProperty("--cc",k.color);
          g.textContent="↳ "+k.t;colaEl.appendChild(g);
          emit(k,lvl+1);
        }else{
          const c=cardFor(k,0,false);
          if(lvl===1)c.classList.add("ind2");
          if(lvl>=2)c.classList.add("ind3");
          colaEl.appendChild(c);
        }
      });
    })(b,0);
  });
}

/* ---------- modos ---------- */
const bMap=document.getElementById("mMap"),bCola=document.getElementById("mCola");
function mode(m){
  bMap.classList.toggle("on",m==="map");bCola.classList.toggle("on",m==="cola");
  mapEl.style.display=m==="map"?"block":"none";
  colaEl.style.display=m==="cola"?"block":"none";
  crumbsEl.style.display=m==="map"?"flex":"none";
  document.getElementById("hint").textContent=m==="map"
    ?"toque num ramo para entrar · toque numa fala para marcar como dita"
    :"script corrido — toque numa fala para marcar como dita";
  if(m==="map")requestAnimationFrame(draw);
}
bMap.onclick=()=>mode("map");
bCola.onclick=()=>mode("cola");
addEventListener("resize",()=>{if(mapEl.style.display!=="none")draw();});

renderCola();
renderMap();
mode("map");
</script>
</body>
</html>
