  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #F2EFE9; --text: #26251F; --accent: #4A5D43; --muted: #6E6C60; --f: 'Archivo', sans-serif; --f-serif: 'Besley', Georgia, serif; }
    html, body { height: 100%; font-family: var(--f); }
    body {
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100dvh; padding: 2rem;
      overflow: hidden; position: relative;
    }
    ::selection { background: var(--accent); color: var(--bg); }

    .num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-serif);
      font-size: clamp(20rem, 50vw, 45rem); font-weight: 700; line-height: 1;
      letter-spacing: -.06em; text-transform: uppercase;
      color: transparent; -webkit-text-stroke: 1px rgba(38,37,31,.045);
      user-select: none; pointer-events: none;
    }

    .content {
      position: relative; z-index: 2;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 2rem;
    }

    .eyebrow {
      font-size: .6rem; font-weight: 600; letter-spacing: .3em;
      text-transform: uppercase; color: var(--accent);
    }

    .title {
      font-family: var(--f-serif);
      font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 700;
      letter-spacing: -.015em; line-height: 1.05; text-transform: none;
    }

    .desc {
      font-size: .9rem; font-weight: 300; line-height: 1.7;
      color: rgba(38,37,31,.55); max-width: 36ch;
    }

    .cta {
      display: inline-flex; align-items: center; gap: .75rem;
      padding: .9rem 2rem; background: #26251F;
      font-size: .65rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: #F2EFE9;
      text-decoration: none; transition: background .2s;
    }
    .cta:hover { background: var(--accent); }

    .logo {
      position: fixed; top: 1.75rem; left: 50%; transform: translateX(-50%);
      font-family: var(--f-serif);
      font-size: .75rem; font-weight: 800; letter-spacing: .18em;
      text-transform: uppercase; text-decoration: none; color: var(--text);
      opacity: .5;
    }
  </style>
