<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0C0C0E;
    font-family: 'Sora', sans-serif;
    color: #FAFAFA;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px 80px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Accent glow */
  body::after {
    content: '';
    position: absolute;
    bottom: -80px;
    right: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(255,61,0,.18) 0%, transparent 65%);
    pointer-events: none;
  }

  .top {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
  }

  .logo-dot { color: #FF3D00; }

  .divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,.2);
  }

  .tagline {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(250,250,250,.4);
  }

  .center {
    position: relative;
    z-index: 1;
  }

  .headline {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -.04em;
    line-height: .9;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .headline .acc { color: #FF3D00; }

  .sub {
    font-size: 18px;
    font-weight: 300;
    color: rgba(250,250,250,.5);
    max-width: 540px;
    line-height: 1.6;
  }

  .bottom {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .services {
    display: flex;
    gap: 24px;
  }

  .service-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(250,250,250,.3);
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,.08);
  }

  .cta {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #FF3D00;
  }

  /* Ghost text */
  .ghost {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 320px;
    font-weight: 800;
    letter-spacing: -.08em;
    color: rgba(250,250,250,.015);
    text-transform: uppercase;
    user-select: none;
    pointer-events: none;
    line-height: 1;
  }
</style>
<script src="https://t.contentsquare.net/uxa/f628ebc890c4d.js" defer></script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div class="ghost">IR</div>

  <div class="top">
    <span class="logo">IRBIS<span class="logo-dot">.</span></span>
    <div class="divider"></div>
    <span class="tagline">Estúdio Digital</span>
  </div>

  <div class="center">
    <h1 class="headline">
      Sites, marcas<br>e sistemas<br><span class="acc">digitais.</span>
    </h1>
    <p class="sub">Solo com IA. Do briefing ao ar, fala direto com quem construiu.</p>
  </div>

  <div class="bottom">
    <div class="services">
      <span class="service-tag">Webdesign</span>
      <span class="service-tag">Branding</span>
      <span class="service-tag">Produto Digital</span>
      <span class="service-tag">Estratégia</span>
    </div>
    <span class="cta">irbis.com.br</span>
  </div>

</body>
</html>
